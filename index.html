<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portal Replante</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css?v=20260712-arimo">
</head>
<body>
    <section id="loginView" class="login-page oculto">
        <main class="login-box">
            <div class="login-brand">
                <span class="brand-mark">R</span>
                <div>
                    <h1>Portal Replante</h1>
                    <p>Projetos e oportunidades ambientais</p>
                </div>
            </div>
            <p class="login-mode">Login via Supabase</p>
            <p id="loginErro" class="alerta oculto"></p>
            <form id="loginForm" class="login-form">
                <label>
                    Email
                    <input id="email" type="email" autocomplete="username" required autofocus>
                </label>
                <label>
                    Senha
                    <input id="senha" type="password" autocomplete="current-password" required>
                </label>
                <button type="submit">Entrar</button>
            </form>
        </main>
    </section>

    <section id="appView" class="app-shell oculto">
        <header class="appbar">
            <a class="brand brand-logo" href="#dashboard" data-route="dashboard" aria-label="Replante Engenharia - Início">
                <img src="./assets/logo-replante-horizontal.png" alt="Replante Engenharia">
            </a>
            <nav class="nav">
                <a href="#dashboard" data-route="dashboard">Início</a>
                <a href="#projetos" data-route="projetos">Projetos</a>
                <a href="#calendario" data-route="calendario">Calendário</a>
                <a href="#prospeccao" data-route="prospeccao">Prospecção</a>
                <a href="#licitacoes" data-route="licitacoes">Licitações</a>
                <a href="#regras" data-route="regras">Regras PRAD</a>
                <a href="#configuracoes" data-route="configuracoes">Configurações</a>
            </nav>
            <div class="conta-menu">
                <button id="menuContaBtn" class="conta-gatilho" type="button" aria-expanded="false" aria-controls="menuConta" title="Abrir menu da conta">
                    <span id="avatarTopo" class="avatar-topo" aria-hidden="true">R</span>
                    <span id="usuarioAtual" class="conta-nome"></span>
                </button>
                <div id="menuConta" class="menu-conta" hidden>
                    <div class="menu-conta-cabecalho">
                        <strong id="nomeContaMenu"></strong>
                        <span id="emailContaMenu"></span>
                    </div>
                    <a href="#perfil">Editar perfil</a>
                    <button id="logoutBtn" type="button">Sair</button>
                </div>
            </div>
        </header>

        <main class="conteudo">
            <header class="topbar">
                <div>
                    <p id="eyebrow" class="eyebrow">Visão geral</p>
                    <h1 id="pageTitle">Início</h1>
                </div>
                <div id="topbarActions" class="acoes-topo"></div>
            </header>

            <p id="mensagem" class="mensagem oculto"></p>
            <section id="conteudo"></section>
        </main>
    </section>

    <script src="./config.js"></script>
    <script type="module" src="./app.js?v=20260712-alerta-manutencao"></script>
</body>
</html>
